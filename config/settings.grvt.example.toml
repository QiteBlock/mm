[venue]
kind = "grvt"
api_base_url = "https://api.hibachi.xyz"
data_api_base_url = "https://data-api.hibachi.xyz"
ws_market_url = "wss://data-api.hibachi.xyz/ws/market"
ws_account_url = "wss://api.hibachi.xyz/ws/account"
account_id = 0
api_key = ""
private_key = ""
grvt_chain_id = "325"
grvt_builder_id = ""
grvt_builder_fee = "0"

[runtime]
dry_run = true
restore_dry_run_state = false
reconcile_interval_ms = 2000
generation_min_interval_ms = 2000
stale_market_data_ms = 5000
websocket_send_timeout_ms = 5000
max_orderbook_depth = 100

[network]
private_rest_min_interval_ms = 300
retry_max_attempts = 4
retry_initial_backoff_ms = 250
retry_max_backoff_ms = 2000
websocket_reconnect_backoff_ms = 1000


[model]
born_inf_bps = "3"
born_sup_bps = "8"
v0 = "0.4"
mu = "0.5"
sigma = "2.7"
n_points = 1
min_step_price = "0.001"
min_step_volume = "0.01"
min_trade_amount = "5"
position_size_skew_weight = "0.7"
position_spread_multiplier = "2.0"
position_dead_zone = "0.001"
price_sensitivity_threshold = "0.005"
price_sensitivity_scaling_factor = "0.75"
volume_sensitivity_threshold = "0.10"
volatility_cut_threshold = "0.015"
index_forward_buffer_bps = "2"
max_spread_bps = "20"
prevent_spread_crossing = true
cancel_orders_crossing_mid = true
as_gamma = "0.1"
as_kappa = "8000.0"
as_time_horizon = "0.5"
inventory_lean_bps = "14.0"
as_vol_cap = "0.001"

[risk]
max_abs_position_usd = "200"
max_symbol_position_usd = "200"
max_drawdown_usd = "20"
max_open_orders = 20
emergency_widening_bps = "3"
circuit_breaker_cooldown_ms = 3000
emergency_skew_start = "0.65"
emergency_skew_max = "1.50"
max_correlated_position_usd = "200"

[factors]
volume_window_secs = 30
n_trade_window_secs = 30
n_trade_quote_threshold = 0
volatility_ewma_alpha = "0.2"
volatility_spread_weight = "20"
inventory_skew_weight = "2.5"
volume_size_weight = "0.005"
flow_imbalance_weight = "0.15"
trade_velocity_alpha = "0.35"
trade_velocity_burst_threshold = "2"
bbo_spread_vol_weight = "0.05"
inventory_risk_constant = "300"
inventory_skew_convexity = "1.0"
regime_min_dwell_secs = 3
cross_symbol_vol_weight = "0.0"
volatility_floor = "0.0003"
ob_imbalance_weight = "1.5"
ob_imbalance_depth = 10
bbo_spread_cap_bps = "20"
flow_spike_pause_threshold = "0.85"

[storage]
enabled = true
db_path = "data/fills-grvt-real.db"

[[pairs]]
symbol = "HYPE/USDT-P"
enabled = true
max_position_base = "2"
price_source = "mid"
post_only = true
service_on = true
side_filter = "both"
binance_symbol = "hypeusdt"

[[pairs]]
symbol = "EDGE/USDT-P"
enabled = false
max_position_base = "50"
price_source = "mid"
post_only = true
service_on = true
side_filter = "both"
binance_symbol = "edgeusdt"